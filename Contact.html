<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact Us</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #fff;
    min-height: 100vh;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  header {
    position: sticky; top: 0; background: transparent; padding: 20px; z-index: 999;
  }
  nav { display: flex; justify-content: center; align-items: center; }
  .logo img { height: 60px; transition: transform 0.3s; }
  .container {
    max-width: 800px;
    margin: 40px auto;
    padding: 30px;
    background: rgba(0,0,0,0.3);
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
    animation: fadeIn 1s ease-in-out;
  }
  @keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
  }
  h1 { text-align: center; font-size: 2.8rem; margin-bottom: 20px; letter-spacing: 2px; text-shadow: 1px 1px 4px rgba(0,0,0,0.6); }
  p { text-align: center; font-size: 1.2rem; margin-bottom: 30px; line-height: 1.5; }
  form { display: flex; flex-direction: column; }
  .form-group { position: relative; margin-bottom: 25px; }
  label {
    position: absolute; top: 50%; left: 20px; transform: translateY(-50%);
    background: transparent; padding: 0 8px; color: #fff; font-weight: 600; font-size: 1rem; pointer-events: none;
    transition: all 0.3s ease;
  }
  input[type="text"], input[type="email"], textarea {
    width: 100%; padding: 20px 20px 10px 20px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1);
    color: #fff; font-size: 1rem; transition: all 0.3s ease;
  }
  input[type="text"]:focus, input[type="email"]:focus, textarea:focus {
    outline: none; background: rgba(255,255,255,0.2); box-shadow: 0 0 10px #f15922;
  }
  input:focus + label,
  input:not(:placeholder-shown) + label,
  textarea:focus + label,
  textarea:not(:placeholder-shown) + label {
    top: -10px; left: 15px; font-size: 0.8rem; color: #f15922; background: #222; padding: 0 5px; border-radius: 5px;
  }
  button[type="submit"] {
    align-self: center; padding: 15px 30px; font-size: 1.2rem; border: none; border-radius: 25px; background-color: #f15922; color: #fff; cursor: pointer; transition: all 0.3s ease;
  }
  button[type="submit"]:hover {
    background-color: #ff8c00; transform: scale(1.05);
  }
  footer {
    background: rgba(0,0,0,0.3); padding: 20px; text-align: center; font-size: 1rem; box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
  }
  footer a img { max-height: 40px; margin-bottom: 10px; transition: transform 0.3s; }
  footer a img:hover { transform: rotate(10deg); }
  @media(max-width:768px){
    body { font-size: 1rem; }
    .container { padding: 20px; margin: 20px; }
  }
</style>
</head>
<body>
<header>
  <nav>
    <div class="logo"><a href="#"><img src="teamlogolit.svg" alt="Z.I.P Ties" /></a></div>
  </nav>
</header>
<div class="container">
  <h1>Contact Us</h1>
  <p>We'd love to hear from you! Send us an email and we'll get back to you as soon as possible.</p>
  <form method="post" action="process_form.php" autocomplete="off">
    <div class="form-group">
      <input type="text" id="firstName" name="firstName" placeholder=" " required />
      <label for="firstName">First Name</label>
    </div>
    <div class="form-group">
      <input type="text" id="lastName" name="lastName" placeholder=" " required />
      <label for="lastName">Last Name</label>
    </div>
    <div class="form-group">
      <input type="email" id="email" name="email" placeholder=" " required />
      <label for="email">Email</label>
    </div>
    <div class="form-group">
      <textarea id="message" name="message" rows="6" placeholder=" " required></textarea>
      <label for="message">Your Message</label>
    </div>
    <button type="submit">Send Message</button>
  </form>
</div>
<footer>
  <a href="admin.html"><img src="teamlogolit.svg" alt="Team Logo" /></a>
  <p>&copy; 2026 Z.I.P Ties</p>
</footer>
</body>
</html>
